<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to Elinsi Tech</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:   #00d4ff;
      --blue:   #0077cc;
      --glow:   #00aaff;
      --white:  #e8f4ff;
      --bg:     #000000;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── circuit-board background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,170,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,170,255,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── animated corner particles ── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particles span {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--cyan);
      border-radius: 50%;
      animation: drift linear infinite;
      opacity: 0;
    }
    @keyframes drift {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: .6; }
      100% { transform: translateY(-10px) translateX(40px); opacity: 0; }
    }

    /* ── top-right nav link ── */
    .home-link {
      position: fixed;
      top: 22px;
      right: 32px;
      font-family: 'Orbitron', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--cyan);
      text-decoration: none;
      border: 1px solid rgba(0,212,255,.35);
      padding: 8px 18px;
      border-radius: 3px;
      transition: background .25s, box-shadow .25s, color .25s;
      z-index: 100;
    }
    .home-link:hover {
      background: rgba(0,212,255,.12);
      box-shadow: 0 0 14px rgba(0,212,255,.5);
      color: #fff;
    }

    /* ── main card ── */
    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeIn .9s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── headline ── */
    .headline {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      font-weight: 900;
      letter-spacing: .06em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #6ee8ff 0%, #ffffff 40%, #6ee8ff 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      /* italic to match original */
      font-style: italic;
      margin-bottom: 36px;
      text-align: center;
      animation: fadeIn .9s .1s ease both;
    }

    /* ── logo wrapper ── */
    .logo-wrap {
      width: 250px;
      height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 52px;
      animation: fadeIn .9s .2s ease both;
    }
    /* pulsing ring behind logo */
    .logo-wrap::before, .logo-wrap::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0,170,255,.25);
      animation: ring-pulse 3s ease-in-out infinite;
    }
    .logo-wrap::before { width: 160px; height: 160px; animation-delay: 0s; }
    .logo-wrap::after  { width: 200px; height: 200px; animation-delay: .8s; }
    @keyframes ring-pulse {
      0%, 100% { opacity: .25; transform: scale(1); }
      50%       { opacity: .7;  transform: scale(1.04); }
    }
    .logo-wrap img {
      width: 130px;
      height: auto;
      filter: drop-shadow(0 0 18px rgba(0,180,255,.8))
              drop-shadow(0 0 40px rgba(0,100,200,.5));
      transition: filter .4s;
    }
    .logo-wrap:hover img {
      filter: drop-shadow(0 0 26px rgba(0,212,255,1))
              drop-shadow(0 0 60px rgba(0,140,255,.7));
    }

    /* ── nav menu ── */
    nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: fadeIn .9s .35s ease both;
    }

    nav a {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(.85rem, 2.2vw, 1.05rem);
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--white);
      padding: 14px 60px;
      position: relative;
      transition: color .25s, letter-spacing .25s;
      text-align: center;
    }

    /* underline bar */
    nav a::after {
      content: '';
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      transition: width .35s ease;
    }
    nav a:hover { color: var(--cyan); letter-spacing: .28em; }
    nav a:hover::after { width: 70%; }

    /* left / right accent dots on hover */
    nav a::before {
      content: '◆';
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%) scale(0);
      font-size: .5rem;
      color: var(--cyan);
      transition: transform .25s, opacity .25s;
      opacity: 0;
    }
    nav a:hover::before { transform: translateY(-50%) scale(1); opacity: 1; }

    /* ── scanline overlay ── */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,.07) 3px,
        rgba(0,0,0,.07) 4px
      );
      pointer-events: none;
      z-index: 50;
    }
  </style>
</head>
<body>

  <!-- particles -->
  <div class="particles" id="particles"></div>

  <!-- scanlines -->
  <div class="scanlines"></div>

  <!-- top-right back link -->
  <a class="home-link" href="index.html">&#8592; Home</a>

  <!-- main content -->
  <div class="card">
    <h1 class="headline">Welcome to Elinsi Tech</h1>

    <div class="logo-wrap">
      <img src="etlogo.png" alt="Elinsi Tech Logo" />
    </div>

    <nav>
      <a href="signin.html">Sign-In</a>
      <a href="register.html">Register</a>
      <a href="Logprototype.html">Prototypes</a>
    </nav>
  </div>

  <script>
    // generate floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const s = document.createElement('span');
      s.style.left     = Math.random() * 100 + 'vw';
      s.style.width    = (Math.random() * 3 + 1) + 'px';
      s.style.height   = s.style.width;
      s.style.animationDuration  = (Math.random() * 14 + 8) + 's';
      s.style.animationDelay     = (Math.random() * 12) + 's';
      s.style.opacity  = 0;
      container.appendChild(s);
    }
  </script>
</body>
</html>
