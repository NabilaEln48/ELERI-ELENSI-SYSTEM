<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Elinsi Tech</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:      #188ea2;
      --teal-dark: #169fbe;
      --teal-lt:   #03f7e7;
      --ink:       #06b2c9;
      --muted:     #7a8e8c;
      --border:    #117a91;
      --bg:        #ebf6f6;
      --card-bg:   #000000f7;
      --input-bg:  #eceef0;
      --shadow:    #0c322f9f;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* ── decorative concentric rings ── */
    .rings {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }
    .rings span {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(26,138,130,.10);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
    }
    .rings span:nth-child(1) { width: 340px; height: 340px; }
    .rings span:nth-child(2) { width: 520px; height: 520px; border-color: rgba(26,138,130,.07); }
    .rings span:nth-child(3) { width: 700px; height: 700px; border-color: rgba(26,138,130,.05); }
    .rings span:nth-child(4) { width: 900px; height: 900px; border-color: rgba(26,138,130,.03); }

    /* ── back link ── */
    .back-link {
      position: fixed;
      top: 22px;
      left: 28px;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--teal);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity .2s;
      z-index: 10;
    }
    .back-link:hover { opacity: .7; }

    /* ── home link top right ── */
    .home-link {
      position: fixed;
      top: 22px;
      right: 28px;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--teal);
      text-decoration: none;
      transition: opacity .2s;
      z-index: 10;
    }
    .home-link:hover { opacity: .7; }

    /* ── card ── */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card-bg);
      border-radius: 20px;
      padding: 52px 48px 44px;
      width: min(460px, 92vw);
      box-shadow:
        0 2px 0 var(--border),
        0 12px 48px var(--shadow),
        0 2px 8px rgba(0,0,0,.04);
      border-top: 3px solid var(--teal);
      animation: rise .55s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── eyebrow ── */
    .eyebrow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 18px;
    }
    .eyebrow::before, .eyebrow::after {
      content: '';
      flex: 1;
      max-width: 40px;
      height: 1px;
      background: var(--teal);
      opacity: .5;
    }

    /* ── heading ── */
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem;
      font-weight: 400;
      color: var(--ink);
      text-align: center;
      line-height: 1.15;
      margin-bottom: 10px;
    }
    h1 em {
      font-style: italic;
      color: var(--teal);
    }

    .subtitle {
      text-align: center;
      font-size: .9rem;
      color: var(--muted);
      margin-bottom: 38px;
    }

    /* ── form ── */
    .field {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid transparent;
      border-radius: 10px;
      padding: 13px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--ink);
      outline: none;
      transition: border-color .2s, background .2s;
    }
    input::placeholder { color: #aab8b6; }
    input:focus {
      border-color: var(--teal);
      background: #fff;
    }
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      padding: 0;
      transition: color .2s;
    }
    .toggle-pw:hover { color: var(--teal); }

    /* ── forgot ── */
    .forgot-row {
      text-align: right;
      margin-top: 8px;
      margin-bottom: 28px;
    }
    .forgot-row a {
      font-size: .85rem;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }
    .forgot-row a:hover { color: var(--teal); }

    /* ── submit button ── */
    .btn-signin {
      width: 100%;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 16px 0;
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background .25s, transform .15s, box-shadow .25s;
      box-shadow: 0 4px 18px rgba(15,35,32,.22);
    }
    .btn-signin:hover {
      background: #1a2e2b;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(15,35,32,.3);
    }
    .btn-signin:active { transform: translateY(0); }
    .arrow { font-size: 1.1rem; }

    /* ── footer ── */
    .card-footer {
      text-align: center;
      margin-top: 28px;
      font-size: .88rem;
      color: var(--muted);
    }
    .card-footer a {
      color: var(--teal);
      font-weight: 600;
      text-decoration: none;
      transition: opacity .2s;
    }
    .card-footer a:hover { opacity: .75; }
  </style>
</head>
<body>

  <div class="rings">
    <span></span><span></span><span></span><span></span>
  </div>

  <a class="back-link" href="login.html">&#8592; Back to Login</a>

  <div class="card">
    <div class="eyebrow">Welcome Back</div>

    <h1>Sign in to <em>ELINSI.</em></h1>
    <p class="subtitle">Your hiring engine is waiting.</p>

    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="alex@example.com" autocomplete="email"/>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        <button class="toggle-pw" type="button" onclick="togglePw()" aria-label="Toggle password">
          <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="forgot-row"><a href="#">Forgot password?</a></div>

    <button class="btn-signin" type="button">
      Sign In <span class="arrow">→</span>
    </button>

    <p class="card-footer">
      No account? <a href="register.html">Create one free →</a>
    </p>
  </div>

  <script>
    function togglePw() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
